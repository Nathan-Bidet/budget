services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      BACKEND_PORT: 4000
      NODE_ENV: production
    expose:
      - "4000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"

  caddy:
    # Image custom : le Caddyfile est copié dedans (voir caddy/Dockerfile),
    # plus de bind-mount de fichier (incompatible avec le déploiement Git).
    build:
      context: .
      dockerfile: caddy/Dockerfile
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    # HTTP simple : le HTTPS est géré par Cloudflare Tunnel en amont.
    # Le tunnel doit pointer sur http://<IP_privée_VM>:${CADDY_HTTP_PORT}
    ports:
      - "${CADDY_HTTP_PORT:-8080}:80"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
